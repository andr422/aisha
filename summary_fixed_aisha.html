<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сводный чек-лист</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background: #f8f9fa;
    }

    h2,
    h3 {
      margin-bottom: 12px;
      text-align: center;
    }

    .session-info {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .session-info > div {
      flex: 1;
      min-width: 120px;
    }

    .session-info label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .session-info input {
      width: auto;
      max-width: 200px;
      padding: 4px 8px;
      font-size: 14px;
      border: 1px solid #1a3ea9;
      border-radius: 4px;
    }

    .protocol-container {
      margin-bottom: 24px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .protocol-title {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #1a3ea9;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .goal-group {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      background: #f9f9f9;
    }

    .goal-input,
    .intro-date,
    .mastery-date,
    .gen-input {
      padding: 8px;
      font-size: 16px;
      border: 1px solid #93a7e4;
      border-radius: 4px;
    }

    .goal-input {
      flex: 2;
    }

    .intro-date,
    .mastery-date {
      flex: 1;
      border-color: #6877a5;
    }

    .gen-input {
      border-color: #ccc;
      width: calc((100% - 16px) / 3);
      margin-right: 8px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .nav-left-floating {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9999;
    }

    .nav-left-floating a {
      background: #007bff;
      color: white;
      padding: 14px 18px;
      border-radius: 30px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h2>Сводный чек-лист</h2>

  <div class="session-info">
    <div>
      <label for="childName">Имя ребенка</label>
      <input type="text" id="childName" placeholder="Введите имя" />
    </div>
    <div>
      <label for="sessionDate">Дата сессии</label>
      <input type="date" id="sessionDate" />
    </div>
  </div>

  <div id="protocolsContainer"></div>

  <div class="nav-left-floating">
    <a href="final_fixed_aisha.html">➡ Ежедневный чек-лист</a>
  </div>

  <script>
    (function () {
      const summaryCount = 15;
      const sessionKey = "session_date";
      const nameKey = "child_name";
      const container = document.getElementById("protocolsContainer");
      const dateInput = document.getElementById("sessionDate");
      const nameInput = document.getElementById("childName");

      function initSessionFields() {
        const savedDate = localStorage.getItem(sessionKey);
        if (savedDate) {
          dateInput.value = savedDate;
        }
        dateInput.addEventListener("change", () => {
          localStorage.setItem(sessionKey, dateInput.value);
        });

        const savedName = localStorage.getItem(nameKey);
        if (savedName) {
          nameInput.value = savedName;
        }
        nameInput.addEventListener("input", () => {
          localStorage.setItem(nameKey, nameInput.value);
        });
      }

      function renderSummary() {
        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= summaryCount; i += 1) {
          const protocol = document.createElement("div");
          protocol.className = "protocol-container";
          protocol.dataset.index = i;

          const titleHeading = document.createElement("h3");
          titleHeading.textContent = `Протокол ${i}`;
          protocol.appendChild(titleHeading);

          const titleInput = document.createElement("input");
          titleInput.type = "text";
          titleInput.className = "protocol-title";
          titleInput.dataset.index = i;
          titleInput.placeholder = `Название протокола ${i}`;
          titleInput.value = localStorage.getItem(`protocol${i}_title`) || "";
          protocol.appendChild(titleInput);

          for (let j = 1; j <= 10; j += 1) {
            const group = document.createElement("div");
            group.className = "goal-group";

            const rowMain = document.createElement("div");
            rowMain.className = "row";

            const goal = document.createElement("input");
            goal.type = "text";
            goal.className = "goal-input";
            goal.dataset.protocolIndex = i;
            goal.dataset.goalIndex = j;
            goal.placeholder = `Цель ${j}`;
            goal.value = localStorage.getItem(`protocol${i}_goal${j}`) || "";
            rowMain.appendChild(goal);

            const intro = document.createElement("input");
            intro.type = "date";
            intro.className = "intro-date";
            intro.dataset.protocolIndex = i;
            intro.dataset.goalIndex = j;
            intro.value = localStorage.getItem(`protocol${i}_goal${j}_introDate`) || "";
            rowMain.appendChild(intro);

            const mastery = document.createElement("input");
            mastery.type = "date";
            mastery.className = "mastery-date";
            mastery.dataset.protocolIndex = i;
            mastery.dataset.goalIndex = j;
            mastery.value = localStorage.getItem(`protocol${i}_goal${j}_masteryDate`) || "";
            rowMain.appendChild(mastery);

            group.appendChild(rowMain);

            const rowGen = document.createElement("div");
            rowGen.className = "row";
            ["Stim", "Place", "People"].forEach((type) => {
              const input = document.createElement("input");
              input.type = "text";
              input.className = "gen-input";
              input.dataset.protocolIndex = i;
              input.dataset.goalIndex = j;
              input.dataset.genType = type.toLowerCase();
              input.placeholder = `Генерализация: ${type.toLowerCase()}`;
              input.value = localStorage.getItem(`protocol${i}_goal${j}_gen${type}`) || "";
              rowGen.appendChild(input);
            });

            group.appendChild(rowGen);
            protocol.appendChild(group);
          }

          fragment.appendChild(protocol);
        }

        container.innerHTML = "";
        container.appendChild(fragment);
      }

      function bindEvents() {
        container.addEventListener("input", (event) => {
          const el = event.target;
          const protocolIndex = el.dataset.protocolIndex || el.dataset.index;
          const goalIndex = el.dataset.goalIndex;

          if (el.classList.contains("protocol-title")) {
            localStorage.setItem(`protocol${protocolIndex}_title`, el.value);
            return;
          }

          if (el.classList.contains("goal-input")) {
            localStorage.setItem(`protocol${protocolIndex}_goal${goalIndex}`, el.value);
            return;
          }

          if (el.classList.contains("intro-date")) {
            localStorage.setItem(`protocol${protocolIndex}_goal${goalIndex}_introDate`, el.value);
            return;
          }

          if (el.classList.contains("mastery-date")) {
            localStorage.setItem(`protocol${protocolIndex}_goal${goalIndex}_masteryDate`, el.value);
            return;
          }

          if (el.classList.contains("gen-input")) {
            const type = el.dataset.genType;
            const normalizedType = type.charAt(0).toUpperCase() + type.slice(1);
            localStorage.setItem(`protocol${protocolIndex}_goal${goalIndex}_gen${normalizedType}`, el.value);
          }
        });
      }

      function init() {
        initSessionFields();
        renderSummary();
        bindEvents();
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
</html>
