<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ежедневный ABA Чек-лист</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --line: #d9dee3;
      --text: #1f2933;
      --muted: #667085;
      --ok: #d4edda;
      --prompt: #fff3cd;
      --err: #f8d7da;
      --accent: #0d6efd;
      --danger: #dc3545;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    h2, h3 {
      text-align: center;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .controls-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    body.editing .btn-set button {
      pointer-events: none;
      opacity: 0.5;
    }

    .protocol-container {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .protocol-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .block {
      margin-bottom: 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .block.mastered {
      border-color: #55a630;
      background: #eefae9;
    }

    .goal-label {
      display: block;
      padding: 8px;
      background: #e9ecef;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .btn-set {
      display: flex;
      justify-content: space-around;
      gap: 12px;
      margin-bottom: 8px;
    }

    .btn-set > div {
      flex: 1;
    }

    .btn-set button {
      width: 100%;
      padding: 18px;
      font-size: 26px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn-success {
      background: var(--ok);
    }

    .btn-prompt {
      background: var(--prompt);
    }

    .btn-error {
      background: var(--err);
    }

    .count {
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      margin-top: 6px;
    }

    .percent {
      text-align: right;
      font-weight: bold;
    }

    .percent.green {
      color: #2b8a3e;
    }

    .percent.orange {
      color: #d97706;
    }

    .percent.red {
      color: #c92a2a;
    }

    .prev-percent,
    .prompt-details {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .prev-percent::before {
      content: "Пред. сессии: ";
      font-weight: bold;
    }

    .prompt-details:empty {
      display: none;
    }

    .prompt-details::before {
      content: "Подсказки: ";
      font-weight: bold;
    }

    .btn {
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-secondary {
      background: #6c757d;
    }

    .history-session h3 {
      margin: 12px 0 4px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 14px;
      background: var(--card);
    }

    .history-table th,
    .history-table td {
      border: 1px solid #ccc;
      padding: 4px 6px;
      text-align: center;
    }

    .history-table th {
      background: #f0f0f0;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    #goal-selector-modal,
    #prompt-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 420px;
      width: 100%;
      max-height: 80vh;
      overflow: auto;
    }

    .modal-content button {
      margin-top: 8px;
      margin-right: 8px;
    }

    .goal-option {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    #undo-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e0e0e0;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      z-index: 1001;
    }

    .nav-left-floating {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }

    .nav-left-floating a {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 14px 18px;
      border-radius: 30px;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .btn-set {
        gap: 8px;
      }

      .btn-set button {
        padding: 14px;
        font-size: 22px;
      }

      .nav-left-floating {
        position: static;
        margin: 24px 0 12px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h2>Ежедневный ABA Чек-лист</h2>

    <div class="controls mb-16">
      <div>
        <label for="modeSlider">Режим:</label>
        <input id="modeSlider" type="range" min="0" max="1" step="1" value="1" />
        <span id="modeText">Запись ответов</span>
      </div>
      <div class="controls-right">
        <button id="undoBtn" class="btn btn-secondary">Отменить действие</button>
        <button id="sendBtn" class="btn btn-danger">Отправить данные</button>
      </div>
    </div>

    <div id="goal-selector-modal">
      <div class="modal-content">
        <h3>Выберите цели</h3>
        <div id="goal-options"></div>
        <button class="btn btn-primary" type="button" onclick="saveSelectedGoals()">Сохранить</button>
        <button class="btn btn-secondary" type="button" onclick="closeGoalSelector()">Отмена</button>
      </div>
    </div>

    <div id="prompt-modal">
      <div class="modal-content">
        <h3>Выберите тип подсказки</h3>
        <button class="btn btn-secondary" type="button" onclick="selectPrompt('G')">Жестовая</button>
        <button class="btn btn-secondary" type="button" onclick="selectPrompt('V')">Вербальная</button>
        <button class="btn btn-secondary" type="button" onclick="selectPrompt('E')">Эхо</button>
        <button class="btn btn-secondary" type="button" onclick="selectPrompt('PF')">Частичная физическая</button>
        <button class="btn btn-secondary" type="button" onclick="selectPrompt('FF')">Полная физическая</button>
        <button class="btn btn-primary" type="button" onclick="closePromptModal()">Отмена</button>
      </div>
    </div>

    <div id="dailyContainer"></div>
    <div id="undo-banner">Отменить действие</div>
    <div id="historyContainer"><h2>История сессий</h2></div>

    <div class="nav-left-floating">
      <a href="summary_fixed_aisha.html">⬅ Сводный чек-лист</a>
    </div>
  </div>

  <script>
    const CLICK_ENDPOINT = "https://script.google.com/macros/s/AKfycbzu1szsSlgORc4uFgbhy5LvFdCF99UiVuEbzCe_K7UqLvZlmVanUbp6r4pukXbvXZs/exec";
    const SESSION_ENDPOINT = "https://script.google.com/macros/s/AKfycbx1ZyMrh8XoRud0rOeqP_2yBZd6C8AJ8e_v2IATRgztmZV-Q9659GmKmnbhNrAmXbU/exec";
    const PROMPT_CODES = ["G", "V", "E", "PF", "FF"];

    const modeSlider = document.getElementById("modeSlider");
    const modeText = document.getElementById("modeText");
    const dailyContainer = document.getElementById("dailyContainer");
    const historyContainer = document.getElementById("historyContainer");
    const undoBanner = document.getElementById("undo-banner");
    const promptModal = document.getElementById("prompt-modal");

    let undoStack = [];
    let longPressTimer = null;
    let suppressNextClick = false;
    let currentPromptTarget = null;

    function getSessionDateForHistory() {
      const savedDate = localStorage.getItem("session_date");
      if (!savedDate) {
        return new Date().toLocaleDateString("ru-RU");
      }

      const [year, month, day] = savedDate.split("-");
      if (!year || !month || !day) {
        return savedDate;
      }

      return `${day}.${month}.${year}`;
    }

    function getSessionDateForServer() {
      return localStorage.getItem("session_date") || new Date().toISOString().split("T")[0];
    }

    function toggleMode() {
      const editingLocked = modeSlider.value === "0";
      document.body.classList.toggle("editing", editingLocked);
      modeText.textContent = editingLocked ? "Заблокировано" : "Запись ответов";
    }

    function getProtocolsCount() {
      return Object.keys(localStorage)
        .map((key) => (key.match(/^protocol(\d+)_title$/) || [])[1])
        .filter(Boolean)
        .map(Number)
        .reduce((max, n) => Math.max(max, n), 0);
    }

    function getSavedPromptDetails() {
      return JSON.parse(localStorage.getItem("aba_prompt_details") || "[]");
    }

    function setSavedPromptDetails(data) {
      localStorage.setItem("aba_prompt_details", JSON.stringify(data));
    }

    function getSavedResponseLog() {
      return JSON.parse(localStorage.getItem("aba_response_log") || "[]");
    }

    function setSavedResponseLog(data) {
      localStorage.setItem("aba_response_log", JSON.stringify(data));
    }

    function compactPrompt(details) {
      if (!details) return "";
      return PROMPT_CODES
        .map((code) => {
          const count = details[code] || 0;
          return count > 0 ? code + count : "";
        })
        .filter(Boolean)
        .join(" ");
    }

    function normalizePromptDetailsLength() {
      const blocks = document.querySelectorAll(".block").length;
      const current = getSavedPromptDetails();
      const next = [];
      for (let i = 0; i < blocks; i += 1) {
        next.push(current[i] || { G: 0, V: 0, E: 0, PF: 0, FF: 0 });
      }
      setSavedPromptDetails(next);
    }

    function normalizeResponseLogLength() {
      const blocks = document.querySelectorAll(".block").length;
      const current = getSavedResponseLog();
      const next = [];
      for (let i = 0; i < blocks; i += 1) {
        next.push(Array.isArray(current[i]) ? current[i] : []);
      }
      setSavedResponseLog(next);
    }

    function openGoalSelector(idx) {
      window.currentProtocol = idx;
      const options = document.getElementById("goal-options");
      const saved = JSON.parse(localStorage.getItem(`protocol${idx}_selectedGoals`) || "[]");
      options.innerHTML = "";

      for (let j = 1; j <= 10; j += 1) {
        const text = localStorage.getItem(`protocol${idx}_goal${j}`) || `Цель ${j}`;
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `protocol${idx}_goal_option_${j}`;
        checkbox.value = String(j);
        checkbox.checked = saved.includes(j);
        checkbox.onchange = () => {
          if (options.querySelectorAll("input:checked").length > 10) {
            checkbox.checked = false;
          }
        };

        const label = document.createElement("label");
        label.htmlFor = checkbox.id;
        label.textContent = text;

        const row = document.createElement("div");
        row.className = "goal-option";
        row.append(checkbox, label);
        options.append(row);
      }

      document.getElementById("goal-selector-modal").style.display = "flex";
    }

    function closeGoalSelector() {
      document.getElementById("goal-selector-modal").style.display = "none";
    }

    function saveSelectedGoals() {
      const idx = window.currentProtocol;
      if (!idx) return;

      const protocolKey = `protocol${idx}_selectedGoals`;
      const previousGoalIds = JSON.parse(localStorage.getItem(protocolKey) || "[]");
      const previousGoalNames = previousGoalIds.map((goalId) => {
        return localStorage.getItem(`protocol${idx}_goal${goalId}`) || `Цель ${goalId}`;
      });

      const selected = Array.from(document.querySelectorAll("#goal-options input:checked")).map((cb) => Number(cb.value));
      localStorage.setItem(protocolKey, JSON.stringify(selected));

      const nextGoalNames = selected.map((goalId) => {
        return localStorage.getItem(`protocol${idx}_goal${goalId}`) || `Цель ${goalId}`;
      });

      migrateSessionDataForProtocol(idx, previousGoalNames, nextGoalNames);
      closeGoalSelector();
      renderDaily();
      loadProgress();
      renderHistory();
    }

    function migrateSessionDataForProtocol(protocolIndex, previousGoalNames, nextGoalNames) {
      const history = JSON.parse(localStorage.getItem("aba_history") || "[]").map((session) => {
        const previousData = session.data[protocolIndex - 1] || [];
        const previousPromptDetails = session.promptDetails?.[protocolIndex - 1] || [];
        const nextData = nextGoalNames.map((goalName) => {
          const prevIndex = previousGoalNames.indexOf(goalName);
          return prevIndex === -1 ? null : previousData[prevIndex];
        });
        const nextPromptData = nextGoalNames.map((goalName) => {
          const prevIndex = previousGoalNames.indexOf(goalName);
          return prevIndex === -1 ? "" : previousPromptDetails[prevIndex] || "";
        });

        session.data[protocolIndex - 1] = nextData;
        session.promptDetails = session.promptDetails || [];
        session.promptDetails[protocolIndex - 1] = nextPromptData;
        return session;
      });

      localStorage.setItem("aba_history", JSON.stringify(history));
    }

    function checkMastery(goalHistory) {
      const lastThree = goalHistory.slice(-3).filter((value) => value != null);
      return lastThree.length === 3 && lastThree.every((value) => value >= 80);
    }

    function getSelectedGoalIds(protocolIndex) {
      const selected = JSON.parse(localStorage.getItem(`protocol${protocolIndex}_selectedGoals`) || "[]");
      return selected.length ? selected : [1, 2, 3];
    }

    function renderDaily() {
      const count = getProtocolsCount();
      const history = JSON.parse(localStorage.getItem("aba_history") || "[]");
      const lastThreeSessions = history.slice(-3);
      dailyContainer.innerHTML = "";

      if (!count) {
        dailyContainer.innerHTML = '<div class="empty-state">Нет настроенных протоколов в localStorage.</div>';
        return;
      }

      for (let i = 1; i <= count; i += 1) {
        const wrapper = document.createElement("div");
        wrapper.className = "protocol-container";
        wrapper.dataset.index = String(i);

        const title = localStorage.getItem(`protocol${i}_title`) || `Протокол ${i}`;
        const selectedGoals = getSelectedGoalIds(i);

        const header = document.createElement("div");
        header.className = "protocol-header";
        header.innerHTML = `<h3>${title}</h3><button class="btn btn-primary" type="button" onclick="openGoalSelector(${i})">Выбрать цели</button>`;
        wrapper.append(header);

        selectedGoals.forEach((goalId, rowPos) => {
          const goalName = localStorage.getItem(`protocol${i}_goal${goalId}`) || `Цель ${goalId}`;
          const goalHistory = lastThreeSessions.map((session) => session.data[i - 1]?.[rowPos] ?? null);
          const previousPercents = goalHistory.map((value) => (value == null ? "—" : `${value}%`)).join(" | ");
          const mastered = checkMastery(goalHistory);

          const block = document.createElement("div");
          block.className = `block${mastered ? " mastered" : ""}`;
          block.innerHTML = `
            <div class="goal-label">${goalName}</div>
            <div class="btn-set">
              <div><button class="btn-success" type="button" onclick="increment(this, '+')">✅</button><div class="count">0</div></div>
              <div><button class="btn-prompt" type="button">🤝</button><div class="count">0</div></div>
              <div><button class="btn-error" type="button" onclick="increment(this, '-')">➖</button><div class="count">0</div></div>
            </div>
            <div class="percent">—</div>
            <div class="prev-percent">${previousPercents}</div>
            <div class="prompt-details"></div>
          `;
          wrapper.append(block);
        });

        dailyContainer.append(wrapper);
      }

      normalizePromptDetailsLength();
      normalizeResponseLogLength();
      wirePromptButtons();
      updatePromptDetailsUI();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("aba_history") || "[]");
      const protocolsCount = getProtocolsCount();
      historyContainer.innerHTML = "<h2>История сессий</h2>";

      if (!history.length) {
        historyContainer.innerHTML += "<p>Нет сохранённых сессий.</p>";
        return;
      }

      for (let i = 1; i <= protocolsCount; i += 1) {
        const title = localStorage.getItem(`protocol${i}_title`) || `Протокол ${i}`;
        const selectedGoals = getSelectedGoalIds(i);
        const section = document.createElement("div");
        section.className = "history-session";

        const header = document.createElement("h3");
        header.textContent = title;
        section.append(header);

        const table = document.createElement("table");
        table.className = "history-table";

        const thead = table.createTHead();
        const headerRow = thead.insertRow();
        const firstHeader = document.createElement("th");
        firstHeader.textContent = "Цель";
        headerRow.append(firstHeader);

        history.forEach((session) => {
          const th = document.createElement("th");
          th.textContent = session.date;
          headerRow.append(th);
        });

        const tbody = table.createTBody();
        selectedGoals.forEach((goalId, rowIndex) => {
          const row = tbody.insertRow();
          const titleCell = row.insertCell();
          titleCell.textContent = localStorage.getItem(`protocol${i}_goal${goalId}`) || `Цель ${goalId}`;

          history.forEach((session) => {
            const cell = row.insertCell();
            const percent = session.data[i - 1]?.[rowIndex];
            const promptDetail = session.promptDetails?.[i - 1]?.[rowIndex];
            let text = percent == null ? "—" : `${percent}%`;
            if (promptDetail) {
              text += ` [${promptDetail}]`;
            }
            cell.textContent = text;
          });
        });

        section.append(table);
        historyContainer.append(section);
      }
    }

    function sendClickToGoogle(protocol, goal, responseType) {
      fetch(CLICK_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ protocol, goal, response: responseType })
      }).catch(console.error);
    }

    function sendSessionResults(sessionData) {
      fetch(SESSION_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sessionData)
      }).catch(console.error);
    }

    function showUndo() {
      undoBanner.style.display = "block";
      clearTimeout(window.undoTimeout);
      window.undoTimeout = setTimeout(() => {
        if (!undoStack.length) {
          undoBanner.style.display = "none";
        }
      }, 5000);
    }

    function updatePromptDetailsUI() {
      const details = getSavedPromptDetails();
      document.querySelectorAll(".block").forEach((block, index) => {
        const el = block.querySelector(".prompt-details");
        el.textContent = compactPrompt(details[index]);
      });
    }

    function getResponseCode(type) {
      if (type === "+" || type === "-") return type;
      if (PROMPT_CODES.includes(type)) return type;
      return "P";
    }

    function increment(btn, type) {
      if (document.body.classList.contains("editing") || btn.disabled) {
        return;
      }

      const countEl = btn.nextElementSibling;
      countEl.textContent = String((Number(countEl.textContent) || 0) + 1);

      const block = btn.closest(".block");
      const blockIndex = Array.from(document.querySelectorAll(".block")).indexOf(block);
      const protocol = btn.closest(".protocol-container").querySelector("h3").textContent.trim();
      const goal = block.querySelector(".goal-label").textContent.trim();
      const responseCode = getResponseCode(type);
      const responseLog = getSavedResponseLog();
      responseLog[blockIndex] = responseLog[blockIndex] || [];
      responseLog[blockIndex].push(responseCode);
      setSavedResponseLog(responseLog);

      sendClickToGoogle(protocol, goal, responseCode);
      updatePercentages();
      saveProgress();
      undoStack.push({ button: btn, type: responseCode, blockIndex });
      showUndo();
    }

    function updatePercentages() {
      document.querySelectorAll(".block").forEach((block) => {
        const counts = Array.from(block.querySelectorAll(".count")).map((item) => Number(item.textContent) || 0);
        const total = counts.reduce((sum, value) => sum + value, 0);
        const percentEl = block.querySelector(".percent");

        if (!total) {
          percentEl.textContent = "—";
          percentEl.className = "percent";
          return;
        }

        const success = counts[0];
        const percent = Math.round((success / total) * 100);
        percentEl.textContent = `${percent}%`;
        percentEl.className = `percent ${percent >= 80 ? "green" : percent >= 50 ? "orange" : "red"}`;
      });
    }

    function saveProgress() {
      const counts = Array.from(document.querySelectorAll(".count")).map((item) => item.textContent);
      localStorage.setItem("aba_counts", JSON.stringify(counts));
    }

    function loadProgress() {
      const counts = JSON.parse(localStorage.getItem("aba_counts") || "[]");
      document.querySelectorAll(".count").forEach((item, index) => {
        if (counts[index] != null) {
          item.textContent = counts[index];
        }
      });
      updatePercentages();
      updatePromptDetailsUI();
    }

    function undoLastAction() {
      const last = undoStack.pop();
      if (!last) {
        undoBanner.style.display = "none";
        return;
      }

      const countEl = last.button.nextElementSibling;
      countEl.textContent = String(Math.max((Number(countEl.textContent) || 0) - 1, 0));

      const responseLog = getSavedResponseLog();
      if (Array.isArray(responseLog[last.blockIndex]) && responseLog[last.blockIndex].length) {
        responseLog[last.blockIndex].pop();
        setSavedResponseLog(responseLog);
      }

      if (PROMPT_CODES.includes(last.type)) {
        const block = last.button.closest(".block");
        const blockIndex = Array.from(document.querySelectorAll(".block")).indexOf(block);
        const details = getSavedPromptDetails();
        details[blockIndex] = details[blockIndex] || { G: 0, V: 0, E: 0, PF: 0, FF: 0 };
        details[blockIndex][last.type] = Math.max((details[blockIndex][last.type] || 0) - 1, 0);
        setSavedPromptDetails(details);
        updatePromptDetailsUI();
      }

      updatePercentages();
      saveProgress();
      if (!undoStack.length) {
        undoBanner.style.display = "none";
      }
    }

    function finalizeSession() {
      const historyDate = getSessionDateForHistory();
      const serverDate = getSessionDateForServer();
      const child = localStorage.getItem("child_name") || "";
      const session = { date: historyDate, data: [], promptDetails: [] };
      const allBlocks = Array.from(document.querySelectorAll(".block"));
      const promptDetails = getSavedPromptDetails();
      const responseLog = getSavedResponseLog();

      document.querySelectorAll(".protocol-container").forEach((protocolContainer) => {
        const protocol = protocolContainer.querySelector("h3").textContent.trim();
        const goalsForServer = [];
        const protocolData = [];
        const protocolPromptDetails = [];

        Array.from(protocolContainer.querySelectorAll(".block")).forEach((block) => {
          const name = block.querySelector(".goal-label").textContent.trim();
          const counts = Array.from(block.querySelectorAll(".count")).map((item) => Number(item.textContent) || 0);
          const total = counts.reduce((sum, value) => sum + value, 0);
          const percent = total ? Math.round((counts[0] / total) * 100) : null;
          const globalIndex = allBlocks.indexOf(block);
          const promptText = compactPrompt(promptDetails[globalIndex]);
          const responses = Array.isArray(responseLog[globalIndex]) ? responseLog[globalIndex] : [];

          protocolData.push(percent);
          protocolPromptDetails.push(promptText);

          goalsForServer.push({
            name,
            responses: responses.join(" "),
            percent: percent == null ? "" : `${percent}%`,
            promptDetails: promptText
          });
        });

        session.data.push(protocolData);
        session.promptDetails.push(protocolPromptDetails);
        sendSessionResults({ protocol, date: serverDate, child, goals: goalsForServer });
      });

      const history = JSON.parse(localStorage.getItem("aba_history") || "[]");
      history.push(session);
      if (history.length > 10) {
        history.shift();
      }
      localStorage.setItem("aba_history", JSON.stringify(history));

      document.querySelectorAll(".count").forEach((item) => {
        item.textContent = "0";
      });
      setSavedPromptDetails(Array.from(document.querySelectorAll(".block")).map(() => ({ G: 0, V: 0, E: 0, PF: 0, FF: 0 })));
      setSavedResponseLog(Array.from(document.querySelectorAll(".block")).map(() => []));
      undoStack = [];
      undoBanner.style.display = "none";
      updatePercentages();
      updatePromptDetailsUI();
      saveProgress();
      renderHistory();
      renderDaily();
      loadProgress();
    }

    function wirePromptButtons() {
      document.querySelectorAll(".btn-prompt").forEach((btn) => {
        const startPress = () => {
          suppressNextClick = false;
          longPressTimer = setTimeout(() => {
            suppressNextClick = true;
            currentPromptTarget = btn;
            promptModal.style.display = "flex";
          }, 450);
        };

        const endPress = () => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
          }
        };

        btn.addEventListener("pointerdown", startPress);
        btn.addEventListener("pointerup", endPress);
        btn.addEventListener("pointerleave", endPress);
        btn.addEventListener("pointercancel", endPress);
        btn.addEventListener("click", () => {
          if (suppressNextClick) {
            suppressNextClick = false;
            return;
          }
          increment(btn, "P");
        });
      });
    }

    function closePromptModal() {
      promptModal.style.display = "none";
      currentPromptTarget = null;
    }

    function selectPrompt(code) {
      promptModal.style.display = "none";
      if (!currentPromptTarget) return;

      increment(currentPromptTarget, code);
      const block = currentPromptTarget.closest(".block");
      const blockIndex = Array.from(document.querySelectorAll(".block")).indexOf(block);
      const details = getSavedPromptDetails();
      details[blockIndex] = details[blockIndex] || { G: 0, V: 0, E: 0, PF: 0, FF: 0 };
      details[blockIndex][code] = (details[blockIndex][code] || 0) + 1;
      setSavedPromptDetails(details);
      updatePromptDetailsUI();
      currentPromptTarget = null;
    }

    undoBanner.onclick = () => {
      undoLastAction();
    };

    document.addEventListener("DOMContentLoaded", () => {
      modeSlider.oninput = toggleMode;
      document.getElementById("undoBtn").onclick = undoLastAction;
      document.getElementById("sendBtn").onclick = finalizeSession;
      renderDaily();
      loadProgress();
      renderHistory();
      toggleMode();
    });
  </script>
</body>
</html>
